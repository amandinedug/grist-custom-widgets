<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réunions</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="topbar-title">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Réunions
  </span>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-kanban" onclick="setView('kanban')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="12" rx="1"/></svg>
      Kanban
    </button>
    <button class="view-btn" id="btn-calendar" onclick="setView('calendar')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendrier
    </button>
  </div>
  <div class="topbar-spacer"></div>
  <button class="btn-new" onclick="openModal('create')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Nouvelle réunion
  </button>
</div>

<!-- ERROR BANNER -->
<div id="error-banner" class="error-banner hidden" role="alert"></div>

<!-- FILTERBAR -->
<div class="filterbar">
  <span class="filter-label">Projet</span>
  <select class="filter-select" id="flt-projet" onchange="applyFilters()">
    <option value="">Tous</option>
  </select>
  <div class="fdivider"></div>
  <span class="filter-label">Participants</span>
  <div class="team-tags" id="team-tags"></div>
  <select class="filter-select hidden" id="flt-other" onchange="addContactFilterFromDd()">
    <option value="">Autre...</option>
  </select>
  <div class="fdivider"></div>
  <span class="filter-label">Du</span>
  <input type="date" class="filter-select" id="flt-date-from" onchange="applyFilters()" style="padding:3px 6px" autocomplete="off">
  <span class="filter-label">Au</span>
  <input type="date" class="filter-select" id="flt-date-to" onchange="applyFilters()" style="padding:3px 6px" autocomplete="off">
  <button class="btn-reset" onclick="clearFilters()">Réinitialiser</button>
</div>

<!-- VIEWS -->
<div id="v-kanban" class="kanban-board"></div>

<div id="v-calendar" class="hidden" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
  <div class="cal-nav" id="cal-nav"></div>
  <div id="cal-body" style="flex:1;overflow:hidden;display:flex;flex-direction:column"></div>
</div>

<!-- HOLIDAY POPOVER -->
<div class="holiday-popover hidden" id="holiday-popover">
  <div class="holiday-pop-head">
    <span class="holiday-pop-title">🌍 Jours fériés — pays</span>
    <input class="holiday-pop-search" id="holiday-search" type="text"
      placeholder="Rechercher un pays…" autocomplete="off"
      oninput="filterHolidayList()">
  </div>
  <div class="holiday-pop-list" id="holiday-pop-list"></div>
  <div class="holiday-pop-foot">
    <button class="holiday-pop-clear" onclick="clearHolidayCountries()">Tout désélectionner</button>
    <span id="holiday-sel-count" style="font-size:11px;color:var(--text-muted)"></span>
  </div>
</div>

<div id="loader" class="loader">
  <div class="ld"></div><div class="ld"></div><div class="ld"></div>
</div>

<!-- MODAL -->
<div class="overlay hidden" id="overlay" onclick="overlayClick(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-label="Édition d'une réunion" id="modal-root" onclick="event.stopPropagation()">

    <div class="modal-head">
      <input class="modal-title-inp" id="m-titre" type="text" placeholder="Titre de la réunion…" autocomplete="off" aria-label="Titre de la réunion">
      <button class="btn-close" onclick="closeModal()" aria-label="Fermer">×</button>
    </div>

    <div class="modal-body">

      <div class="form-row trio">
        <div class="form-g">
          <label class="form-lbl">Date</label>
          <input class="form-inp" id="m-date" type="date" autocomplete="off" onchange="updateStatutBadge()">
        </div>
        <div class="form-g">
          <label class="form-lbl">Heure</label>
          <input class="form-inp" id="m-heure" type="time" autocomplete="off">
        </div>
        <div class="form-g">
          <label class="form-lbl">Durée (min)</label>
          <!-- FIX: autocomplete="off" ajouté -->
          <input class="form-inp" id="m-duree" type="number" min="0" step="15" placeholder="60" autocomplete="off">
        </div>
      </div>

      <div class="form-g">
        <label class="form-lbl">Projet</label>
        <select class="form-sel" id="m-projet">
          <option value="">— Aucun —</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-g">
          <label class="form-lbl">Statut</label>
          <div id="m-statut-badge" style="padding:7px 10px;border-radius:var(--r-sm);font-size:13px;font-weight:500;border:1px solid var(--border)">—</div>
        </div>
        <div class="form-g">
          <label class="form-lbl">Contre-temps</label>
          <select class="form-sel" id="m-statut-override" onchange="updateStatutBadge()">
            <option value="">— Aucun —</option>
            <option value="Annulée">Annulée</option>
            <option value="Reportée">Reportée</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-g">
          <label class="form-lbl">Type de lieu</label>
          <select class="form-sel" id="m-type-lieu" onchange="updateLieuPh()">
            <option>Présentiel</option>
            <option>Visio</option>
            <option>Hybride</option>
          </select>
        </div>
        <div class="form-g">
          <label class="form-lbl">Lieu / URL</label>
          <input class="form-inp" id="m-lieu" type="text" placeholder="Salle A ou https://…" autocomplete="off">
        </div>
      </div>

      <div class="form-g">
        <label class="form-lbl">Participants</label>
        <div class="parts-wrap">
          <div class="parts-box" id="parts-box" onclick="document.getElementById('parts-srch').focus()">
            <input class="parts-srch" id="parts-srch" type="text" placeholder="Rechercher un contact…"
              oninput="filterPartsDd()" onfocus="showPartsDd()" autocomplete="off">
          </div>
          <div class="parts-dd hidden" id="parts-dd">
            <div id="parts-list"></div>
            <div class="new-contact-form" id="new-contact-form">
              <div class="new-contact-form-title">+ Nouveau contact</div>
              <div class="new-contact-row">
                <input class="new-contact-inp" id="nc-prenom" placeholder="Prénom" autocomplete="off">
                <input class="new-contact-inp" id="nc-nom" placeholder="Nom *" autocomplete="off">
              </div>
              <input class="new-contact-inp" id="nc-email" placeholder="Email" autocomplete="off" type="email">
              <div class="new-contact-actions">
                <button type="button" class="btn-nc-cancel" onclick="resetNewContact()">Annuler</button>
                <button type="button" class="btn-nc-save" id="btn-nc-save" onclick="saveNewContact()">Créer & ajouter</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-g">
        <label class="form-lbl" id="lbl-odj">Ordre du jour</label>
        <div class="rt-ed">
          <div class="rt-bar" onmousedown="event.preventDefault()">
            <button class="rt-btn" title="Gras" onclick="rtCmd('odj','bold')"><b>B</b></button>
            <button class="rt-btn" title="Italique" onclick="rtCmd('odj','italic')"><i style="font-style:italic">I</i></button>
            <div class="rt-sep"></div>
            <button class="rt-btn" title="Titre 1" onclick="rtBlock('odj','h1')" style="font-size:10px;width:22px">H1</button>
            <button class="rt-btn" title="Titre 2" onclick="rtBlock('odj','h2')" style="font-size:10px;width:22px">H2</button>
            <button class="rt-btn" title="Titre 3" onclick="rtBlock('odj','h3')" style="font-size:10px;width:22px">H3</button>
            <div class="rt-sep"></div>
            <button class="rt-btn" title="Liste à puces" onclick="rtCmd('odj','insertUnorderedList')">•</button>
            <button class="rt-btn" title="Citation" onclick="rtBlock('odj','blockquote')" style="font-size:14px">"</button>
          </div>
          <!-- FIX: role + aria-label ajoutés sur les deux contenteditable -->
          <div class="rt-body" id="odj-body" contenteditable="true"
            role="textbox" aria-multiline="true" aria-label="Ordre du jour"
            data-ph="Ordre du jour…" style="min-height:100px"></div>
        </div>
      </div>

      <div class="form-g">
        <label class="form-lbl" id="lbl-cr">Compte rendu</label>
        <div class="rt-ed">
          <div class="rt-bar" onmousedown="event.preventDefault()">
            <button class="rt-btn" title="Gras" onclick="rtCmd('cr','bold')"><b>B</b></button>
            <button class="rt-btn" title="Italique" onclick="rtCmd('cr','italic')"><i style="font-style:italic">I</i></button>
            <div class="rt-sep"></div>
            <button class="rt-btn" title="Titre 1" onclick="rtBlock('cr','h1')" style="font-size:10px;width:22px">H1</button>
            <button class="rt-btn" title="Titre 2" onclick="rtBlock('cr','h2')" style="font-size:10px;width:22px">H2</button>
            <button class="rt-btn" title="Titre 3" onclick="rtBlock('cr','h3')" style="font-size:10px;width:22px">H3</button>
            <div class="rt-sep"></div>
            <button class="rt-btn" title="Liste à puces" onclick="rtCmd('cr','insertUnorderedList')">•</button>
            <button class="rt-btn" title="Citation" onclick="rtBlock('cr','blockquote')" style="font-size:14px">"</button>
          </div>
          <div class="rt-body" id="cr-body" contenteditable="true"
            role="textbox" aria-multiline="true" aria-label="Compte rendu"
            data-ph="Compte rendu…" style="min-height:200px"></div>
        </div>
      </div>

    </div>

    <div class="modal-foot">
      <button class="btn btn-danger hidden" id="btn-del" onclick="deleteReu()" title="Supprimer" aria-label="Supprimer la réunion">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
      <button class="btn btn-ghost hidden" id="btn-dup" onclick="duplicateReu()" title="Dupliquer" aria-label="Dupliquer la réunion">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </button>
      <button class="btn btn-ghost hidden" id="btn-email" onclick="emailParticipants()" title="Envoyer un mail aux participants" aria-label="Envoyer un mail aux participants">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
      </button>
      <div style="flex:1"></div>
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveReu()">Enregistrer</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
