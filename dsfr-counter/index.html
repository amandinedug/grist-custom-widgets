<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compteur de lignes</title>

    <!-- API Grist -->
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

    <!-- DSFR CSS — version (1.14.4) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.14.4/dist/dsfr/dsfr.min.css">

    <style>
        /* === SECTION : LAYOUT === */
        body {
            margin: 0;
            padding: 1rem;
            background-color: var(--background-default-grey);
        }

        /* === SECTION : VUE NORMALE === */
        .counter-value {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .counter-label {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* === SECTION : SWATCHES === */
        .swatch-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .swatch {
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
            padding: 0.4rem 0.3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: border-color 0.15s;
        }

        .swatch:hover    { border-color: var(--border-action-high-blue-france); }
        .swatch.selected { border-color: var(--border-action-high-blue-france); }

        .swatch-apercu {
            width: 100%;
            height: 20px;
            border-radius: 2px;
            padding: 0 !important;
            margin: 0 !important;
            min-height: 0 !important;
            box-shadow: none !important;
        }

        .swatch-nom {
            font-size: 0.65rem;
            text-align: center;
            color: var(--text-mention-grey);
        }

        /* === SECTION : PRÉVISUALISATION === */
        .preview-titre {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-mention-grey);
            margin-bottom: 0.5rem;
        }

        #previewCallout .counter-value { font-size: 2rem; }

        .config-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--text-default-grey);
            margin-bottom: 0.25rem;
        }
    </style>
</head>
<body>

    <!-- === SECTION : BANNIÈRES ET ALERTES === -->
    <div id="error-banner" style="display: none;" role="alert" aria-live="assertive">
        <div class="fr-alert fr-alert--error fr-alert--sm">
            <p id="error-message">Une erreur est survenue.</p>
        </div>
    </div>

    <div id="loader" style="display: none;" aria-live="polite">
        <div class="fr-notice fr-notice--info">
            <p class="fr-notice__title">Chargement en cours…</p>
        </div>
    </div>

    <!-- === SECTION : VUE NORMALE === -->
    <div id="container">
        <div class="fr-callout" id="callout">
            <p class="fr-callout__title counter-value" id="rowCount">0</p>
            <p class="counter-label" id="rowLabel">Label</p>
        </div>
    </div>

    <!-- === SECTION : VUE CONFIGURATION === -->
    <div id="config" style="display: none;">

        <div class="fr-input-group">
            <label class="fr-label" for="labelInput">Label</label>
            <input class="fr-input" type="text" id="labelInput"

        </div>

        <div style="margin-top: 1.5rem;">
            <span class="config-label">Couleur</span>
            <div class="swatch-grid" id="swatchGrid"></div>
        </div>

        <div style="margin-top: 1.5rem;">
            <p class="preview-titre">Prévisualisation</p>
            <div class="fr-callout" id="previewCallout">
                <p class="fr-callout__title counter-value" id="previewCount">42</p>
                <p class="counter-label" id="previewLabel">Label</p>
            </div>
        </div>

        <ul class="fr-btns-group fr-btns-group--inline-sm" style="margin-top: 1.5rem;">
            <li><button class="fr-btn" onclick="enregistrerOptions()">Enregistrer</button></li>
            <li><button class="fr-btn fr-btn--secondary" onclick="annulerOptions()">Annuler</button></li>
        </ul>

    </div>
    
<script>
'use strict';

// ============= SECTION : SÉCURITÉ =============

function echapperHTML(texte) {
    if (!texte && texte !== 0) return '';
    var div = document.createElement('div');
    div.textContent = String(texte);
    return div.innerHTML;
}

// ============= SECTION : UI FEEDBACK =============

/**
 * Affiche la bannière d'erreur avec un message générique (sans détails techniques).
 * @param {string} msg - Message d'erreur à afficher
 */
function afficherErreur(msg) {
    var banner = document.getElementById('error-banner');
    var message = document.getElementById('error-message');
    if (message) message.textContent = msg || 'Une erreur est survenue.';
    if (banner) banner.style.display = '';
}

/** Masque la bannière d'erreur. */
function masquerErreur() {
    var banner = document.getElementById('error-banner');
    if (banner) banner.style.display = 'none';
}

/** Affiche le loader. */
function afficherLoader() {
    var loader = document.getElementById('loader');
    if (loader) loader.style.display = '';
}

/** Masque le loader. */
function masquerLoader() {
    var loader = document.getElementById('loader');
    if (loader) loader.style.display = 'none';
}

// ============= SECTION : CONFIGURATION =============

/* Palette des couleurs fr-callout DSFR 1.13.1 */
var COULEURS = [
    { id: '',                       nom: 'Défaut'   },
    { id: 'green-tilleul-verveine', nom: 'Tilleul'  },
    { id: 'green-bourgeon',         nom: 'Bourgeon' },
    { id: 'green-emeraude',         nom: 'Émeraude' },
    { id: 'green-archipel',         nom: 'Archipel' },
    { id: 'blue-ecume',             nom: 'Écume'    },
    { id: 'purple-glycine',         nom: 'Glycine'  },
    { id: 'pink-tuile',             nom: 'Tuile'    },
    { id: 'yellow-moutarde',        nom: 'Moutarde' },
    { id: 'brown-cafe-creme',       nom: 'Café'     },
    { id: 'beige-gris-galet',       nom: 'Galet'    },
];

// ============= SECTION : STATE =============

var labelCourant    = 'Label';
var couleurCourante = '';
var snapshot        = null;

// ============= SECTION : RENDU ET AFFICHAGE =============

/**
 * Applique une couleur DSFR sur un élément fr-callout.
 */
function appliquerCouleur(el, couleurId) {
    COULEURS.forEach(function(c) {
        if (c.id) el.classList.remove('fr-callout--' + c.id);
    });
    if (couleurId) el.classList.add('fr-callout--' + couleurId);
}

/** Retourne l'identifiant de la couleur sélectionnée dans le panneau. */
function getCouleurSelectionnee() {
    var sel = document.querySelector('.swatch.selected');
    return sel ? sel.dataset.id : '';
}

/** Construit la grille de swatches dans le panneau de configuration. */
function construireSwatches() {
    var grid = document.getElementById('swatchGrid');
    COULEURS.forEach(function(couleur) {
        var sw        = document.createElement('div');
        sw.className  = 'swatch';
        sw.dataset.id = couleur.id;
        sw.title      = couleur.nom;

        var apercu       = document.createElement('div');
        apercu.className = 'swatch-apercu fr-callout' + (couleur.id ? ' fr-callout--' + couleur.id : '');

        var nom         = document.createElement('span');
        nom.className   = 'swatch-nom';
        nom.textContent = couleur.nom;

        sw.appendChild(apercu);
        sw.appendChild(nom);
        sw.addEventListener('click', function() {
            document.querySelectorAll('.swatch').forEach(function(s) {
                s.classList.remove('selected');
            });
            sw.classList.add('selected');
            mettreAJourPrevisualisation();
        });

        grid.appendChild(sw);
    });
}

/** Met à jour la prévisualisation dans le panneau de configuration. */
function mettreAJourPrevisualisation() {
    var label = document.getElementById('labelInput').value;
    var elPreviewLabel = document.getElementById('previewLabel');
    elPreviewLabel.textContent = label;
    elPreviewLabel.style.display = label ? '' : 'none';
    appliquerCouleur(document.getElementById('previewCallout'), getCouleurSelectionnee());
}

// ============= SECTION : GESTION DES ÉVÉNEMENTS =============

/** Enregistre les options via l'API Grist. */
function enregistrerOptions() {
    try {
        grist.widgetApi.setOption('label',     document.getElementById('labelInput').value);
        grist.widgetApi.setOption('couleurId', getCouleurSelectionnee());
    } catch (e) {
        afficherErreur('Impossible d\'enregistrer la configuration.');
    }
}

/**
 * Annule les modifications et restaure l'état avant ouverture du panneau.
 */
function annulerOptions() {
    if (snapshot !== null) {
        labelCourant    = snapshot.label;
        couleurCourante = snapshot.couleurId;
        document.getElementById('rowLabel').textContent = labelCourant;
        appliquerCouleur(document.getElementById('callout'), couleurCourante);
    }
    document.getElementById('container').style.display = '';
    document.getElementById('config').style.display    = 'none';
}

// ============= SECTION : INITIALISATION =============

/**
 * Initialise le widget Grist.
 */
function initGrist() {
    construireSwatches();
    masquerErreur();
    masquerLoader();

    document.getElementById('labelInput').addEventListener('input', mettreAJourPrevisualisation);

    grist.ready({
        requiredAccess: 'read table',
        allowSelectBy: true,
        onEditOptions() {
            snapshot = { label: labelCourant, couleurId: couleurCourante };

            document.getElementById('labelInput').value = labelCourant;
            document.querySelectorAll('.swatch').forEach(function(sw) {
                sw.classList.toggle('selected', sw.dataset.id === couleurCourante);
            });
            mettreAJourPrevisualisation();

            document.getElementById('container').style.display = 'none';
            document.getElementById('config').style.display    = '';
        },
    });

    grist.onOptions(function(customOptions) {
        customOptions   = customOptions || {};
        labelCourant    = customOptions.label     !== undefined ? customOptions.label     : '';
        couleurCourante = customOptions.couleurId !== undefined ? customOptions.couleurId : '';

        var elLabel = document.getElementById('rowLabel');
        elLabel.textContent = labelCourant;
        elLabel.style.display = labelCourant ? '' : 'none';
        appliquerCouleur(document.getElementById('callout'), couleurCourante);

        document.getElementById('container').style.display = '';
        document.getElementById('config').style.display    = 'none';
    });

    grist.onRecords(function(records) {
        try {
            masquerErreur();
            var total = records ? records.length : 0;
            document.getElementById('rowCount').textContent = total.toLocaleString('fr-FR');
        } catch (e) {
            afficherErreur('Erreur lors de la mise à jour du compteur.');
        }
    });
}

document.addEventListener('DOMContentLoaded', initGrist);

console.log('Module de sécurité chargé — Compteur de lignes v1.0');
</script>
</body>
</html>
